<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__TITLE__ — ArchFlow Demo</title>

    <!-- Self-contained viewer: no build step, no internet connection required.
     React/ReactDOM/Babel are vendored locally in ./vendor (see skill setup
     step — download once with curl if this folder doesn't exist yet). The
     component below is transpiled in the browser. -->
    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    <script src="./vendor/babel.min.js"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 24px;
        min-height: 100vh;
        background: #05070c;
        display: flex;
        justify-content: center;
      }
      #root {
        width: 100%;
        max-width: 1500px;
      }

      /* ===== ArchFlow engine styles — identical to DemoFlow.template.css ===== */
      .archflow-container {
        --bg: #080b11;
        --panel: #0f131c;
        --panel-glass: rgba(15, 19, 28, 0.85);
        --ink: #f3f4f6;
        --muted: #9ca3af;
        --line: #1e293b;
        --line-active: #3b82f6;
        --accent: #6366f1;
        --grid: #131924;
        --node-fill: #0f131c;
        --node-stroke: #2e3b52;
        --edge-stroke: #1e293b;
        --bubble-bg: #f3f4f6;
        --bubble-border: #cbd5e1;
        --bubble-text: #1f2937;
        --bubble-who-color: #4b5563;
        --button-bg: #151c2c;
        --button-border: #2e3b52;
        --button-hover-bg: #1f293d;
        --button-hover-border: #3b4e6f;
        --scrollbar-thumb: #1e293b;
        --header-gradient: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
        --done-fill: #121e1a;
        --done-stroke: rgba(34, 197, 94, 0.4);
        --shadow: rgba(0, 0, 0, 0.5);
        --accent-glow: rgba(99, 102, 241, 0.06);
        --node-active-stroke: #5a6578;
        --external-stroke: #6b7280;
        --external-fill: #11151f;

        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--ink);
        font-family:
          "Plus Jakarta Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--line);
        box-shadow: 0 4px 20px var(--shadow);
      }

      .archflow-container.light {
        --bg: #f4f4f8;
        --panel: #ffffff;
        --panel-glass: rgba(255, 255, 255, 0.85);
        --ink: #1f2433;
        --muted: #6b7280;
        --line: #cbd5e1;
        --line-active: #2563eb;
        --accent: #4f46e5;
        --grid: #dfe2ea;
        --node-fill: #ffffff;
        --node-stroke: #cbd5e1;
        --edge-stroke: #cbd5e1;
        --bubble-bg: #f3f4f6;
        --bubble-border: #cbd5e1;
        --button-bg: #ffffff;
        --button-border: #cbd5e1;
        --button-hover-bg: #f3f4f6;
        --button-hover-border: #94a3b8;
        --scrollbar-thumb: #cbd5e1;
        --header-gradient: linear-gradient(135deg, #1f2433 0%, #4b5563 100%);
        --done-fill: #e8f5e9;
        --done-stroke: rgba(34, 197, 94, 0.6);
        --shadow: rgba(0, 0, 0, 0.1);
        --accent-glow: rgba(99, 102, 241, 0.04);
        --node-active-stroke: #a5b4fc;
        --external-stroke: #94a3b8;
        --external-fill: #eef0f4;
      }

      .archflow-container * {
        box-sizing: border-box;
      }

      .archflow-container header {
        padding: 20px 24px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        transition:
          background 0.3s,
          border-color 0.3s;
      }

      .archflow-container header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.015em;
        background: var(--header-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .archflow-container header p {
        margin: 5px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      .archflow-container .toolbar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        padding: 14px 24px;
        background: var(--panel-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 5;
      }

      .archflow-container button {
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid var(--button-border);
        background: var(--button-bg);
        color: var(--ink);
        padding: 8px 16px;
        border-radius: 10px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        white-space: nowrap;
      }

      .archflow-container button:hover {
        background: var(--button-hover-bg);
        border-color: var(--button-hover-border);
        transform: translateY(-1px);
      }
      .archflow-container button:active {
        transform: translateY(1px);
      }

      .archflow-container button.primary {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border-color: #6366f1;
        color: #fff;
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
      }
      .archflow-container button.primary:hover {
        background: linear-gradient(135deg, #4f46e5, #4338ca);
        box-shadow: 0 4px 18px rgba(99, 102, 241, 0.4);
      }
      .archflow-container button:disabled {
        opacity: 0.35;
        cursor: default;
        transform: none !important;
        box-shadow: none !important;
      }

      .archflow-container .toolbar .spacer {
        flex: 1;
      }

      .archflow-container .speed {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        color: var(--muted);
        font-weight: 500;
      }
      .archflow-container .speed-btn {
        padding: 2px 8px;
        font-size: 13px;
        font-weight: 700;
        min-width: 24px;
        height: 24px;
        line-height: 1;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .archflow-container #speedVal {
        font-family: "JetBrains Mono", monospace;
        min-width: 38px;
        text-align: center;
        font-weight: 600;
        display: inline-block;
      }

      .archflow-container .phase-tag {
        font-size: 12px;
        font-weight: 600;
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.1);
        color: #a5b4fc;
        border: 1px solid rgba(99, 102, 241, 0.25);
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .archflow-container.light .phase-tag {
        color: #4f46e5;
        background: rgba(79, 70, 229, 0.08);
        border: 1px solid rgba(79, 70, 229, 0.2);
      }
      .archflow-container .phase-tag::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #4ade80;
        box-shadow: 0 0 6px #4ade80;
        animation: statusPulse 1.8s infinite;
      }

      @keyframes statusPulse {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      .archflow-container .wrap {
        display: flex;
        gap: 0;
        align-items: stretch;
        min-height: 0;
      }

      .archflow-container .stage-area {
        flex: 1;
        min-width: 0;
        background: radial-gradient(
          circle,
          var(--grid) 1.2px,
          transparent 1.2px
        );
        background-size: 24px 24px;
        background-color: var(--bg);
        overflow: hidden;
        position: relative;
      }

      .archflow-container svg.stage {
        display: block;
        width: 100%;
        height: auto;
      }

      .archflow-container .side {
        width: 380px;
        flex: none;
        border-left: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        flex-direction: column;
      }
      .archflow-container .side h2 {
        margin: 0;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        padding: 16px 20px 12px;
        border-bottom: 1px solid var(--line);
      }

      .archflow-container .log {
        padding: 12px 18px 20px;
        overflow-y: auto;
        max-height: 65vh;
      }
      .archflow-container .log::-webkit-scrollbar {
        width: 6px;
      }
      .archflow-container .log::-webkit-scrollbar-track {
        background: transparent;
      }
      .archflow-container .log::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: 999px;
      }
      .archflow-container .log::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }

      .archflow-container .log-item {
        display: flex;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.4;
        margin-bottom: 8px;
        border: 1px solid transparent;
        opacity: 0;
        transform: translateY(6px);
        animation: pop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes pop {
        to {
          opacity: 1;
          transform: none;
        }
      }
      .archflow-container .log-item.cur {
        background: rgba(99, 102, 241, 0.04);
        border-color: rgba(99, 102, 241, 0.12);
      }

      .archflow-container .log-num {
        flex: none;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
        color: #fff;
        background: var(--accent);
      }
      .archflow-container .log-item.data .log-num {
        background: #0ea5a4;
      }
      .archflow-container .log-item.work .log-num {
        background: #f59e0b;
      }

      .archflow-container .log-body {
        color: var(--ink);
        transition: color 0.3s;
      }
      .archflow-container .log-route {
        display: block;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        color: var(--muted);
        margin-bottom: 2px;
        font-weight: 600;
        transition: color 0.3s;
      }

      .archflow-container .edge {
        fill: none;
        stroke: var(--edge-stroke);
        stroke-width: 2.2;
        transition:
          stroke 0.25s,
          stroke-width 0.25s;
      }
      .archflow-container .edge.dashed {
        stroke-dasharray: 6 5;
      }
      .archflow-container .edge.active {
        stroke: var(--line-active);
        stroke-width: 3.5;
        filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.5));
        transition:
          stroke 0.25s,
          filter 0.25s;
      }
      .archflow-container .edge.active.call {
        stroke: #6366f1;
        filter: drop-shadow(0 0 5px rgba(99, 102, 241, 0.5));
      }
      .archflow-container.light .edge.active.call {
        stroke: #4f46e5;
        filter: drop-shadow(0 0 5px rgba(79, 70, 229, 0.4));
      }
      .archflow-container .edge.active.data {
        stroke: #0ea5a4;
        filter: drop-shadow(0 0 5px rgba(14, 165, 164, 0.5));
      }
      .archflow-container .edge.active.flow {
        stroke-dasharray: 8 6;
        animation: dash 0.5s linear infinite;
      }
      .archflow-container .edge.active.flow.flow-reverse {
        animation: dash-reverse 0.5s linear infinite;
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -28;
        }
      }
      @keyframes dash-reverse {
        to {
          stroke-dashoffset: 28;
        }
      }

      .archflow-container .arrow {
        fill: #475569;
        transition: fill 0.25s;
      }
      .archflow-container.light .arrow {
        fill: #94a3b8;
      }
      .archflow-container .arrow.blink {
        animation: arrowBlink 0.8s ease-in-out;
      }
      @keyframes arrowBlink {
        0%,
        100% {
          fill: #475569;
          filter: none;
        }
        20%,
        60% {
          fill: var(--line-active);
          filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.95));
        }
        40%,
        80% {
          fill: #93c5fd;
        }
      }

      .archflow-container .node {
        cursor: pointer;
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .archflow-container .node:hover {
        transform: scale(1.02) translateY(-2px);
      }
      .archflow-container .node-card {
        fill: var(--node-fill);
        stroke: var(--node-stroke);
        stroke-width: 1.5;
        transition:
          stroke 0.25s,
          fill 0.25s,
          filter 0.25s;
      }

      .archflow-container .node.external .node-card {
        fill: var(--external-fill);
        stroke: var(--external-stroke);
        stroke-dasharray: 5 4;
      }
      .archflow-container .node.active .node-card {
        stroke: var(--node-active-stroke);
        stroke-width: 1.8;
        fill: var(--node-fill);
        filter: drop-shadow(0 2px 8px var(--accent-glow));
      }
      .archflow-container .node.external.active .node-card {
        stroke: var(--line-active);
        fill: var(--external-fill);
      }
      .archflow-container .node.working .node-card {
        animation: workpulse 1.2s ease-in-out infinite;
      }
      @keyframes workpulse {
        0%,
        100% {
          filter: drop-shadow(0 0 0 rgba(245, 158, 11, 0));
          stroke: var(--node-stroke);
        }
        50% {
          filter: drop-shadow(0 0 12px rgba(245, 158, 11, 0.5));
          stroke: #f59e0b;
        }
      }
      .archflow-container .node.done .node-card {
        stroke: var(--done-stroke);
        fill: var(--done-fill);
      }

      .archflow-container .node-title {
        font-size: 13.5px;
        font-weight: 700;
        fill: var(--ink);
        transition: fill 0.3s;
      }
      .archflow-container .node-sub {
        font-size: 10px;
        fill: var(--muted);
        transition: fill 0.3s;
      }
      .archflow-container .node-icon {
        font-size: 19px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      .archflow-container .pulse {
        fill: var(--line-active);
        stroke: var(--bg);
        stroke-width: 2;
        filter: drop-shadow(0 0 6px var(--line-active));
      }
      .archflow-container .pulse.data {
        fill: #0ea5a4;
        filter: drop-shadow(0 0 6px #0ea5a4);
      }
      .archflow-container .pulse.call {
        fill: #6366f1;
        filter: drop-shadow(0 0 6px #6366f1);
      }

      .archflow-container .bubble-wrap {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }
      .archflow-container .bubble-wrap.above {
        align-items: flex-end;
      }
      .archflow-container .bubble-wrap.below {
        align-items: flex-start;
      }

      .archflow-container .bubble {
        position: relative;
        max-width: 190px;
        background: var(--bubble-bg);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1.5px solid var(--bubble-border);
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 11.5px;
        line-height: 1.3;
        color: var(--bubble-text);
        box-shadow: 0 8px 24px var(--shadow);
        animation: bubbleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        transition:
          background 0.3s,
          border-color 0.3s,
          color 0.3s,
          box-shadow 0.3s;
      }
      @keyframes bubbleIn {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .archflow-container .bubble-who {
        display: block;
        font-weight: 700;
        font-size: 9px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 3px;
        color: var(--bubble-who-color);
      }
      .archflow-container .bubble::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border: 5px solid transparent;
      }
      .archflow-container .bubble.tail-down::after {
        top: 100%;
        border-top-color: var(--bubble-bg);
        margin-top: -1px;
        transition: border-top-color 0.3s;
      }
      .archflow-container .bubble.tail-up::after {
        bottom: 100%;
        border-bottom-color: var(--bubble-bg);
        margin-bottom: -1px;
        transition: border-bottom-color 0.3s;
      }

      .archflow-container footer {
        padding: 16px 24px 24px;
        font-size: 12.5px;
        color: var(--muted);
        background: var(--panel);
        border-top: 1px solid var(--line);
        line-height: 1.6;
      }
      .archflow-container footer b {
        color: var(--ink);
      }

      .archflow-container .legend {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .archflow-container .legend span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        font-weight: 500;
      }
      .archflow-container .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        box-shadow: 0 0 6px currentColor;
      }

      @media (max-width: 980px) {
        .archflow-container .wrap {
          flex-direction: column;
        }
        .archflow-container .side {
          width: auto;
          border-left: none;
          border-top: 1px solid var(--line);
        }
        .archflow-container .log {
          max-height: 32vh;
        }
      }

      .archflow-container .node.db-ingesting .node-card {
        stroke: #336791 !important;
        stroke-width: 2.2px !important;
        animation: dbIngestGlow 0.4s infinite alternate;
      }
      @keyframes dbIngestGlow {
        from {
          filter: drop-shadow(0 0 3px rgba(51, 103, 145, 0.4));
        }
        to {
          filter: drop-shadow(0 0 14px rgba(51, 103, 145, 0.8));
        }
      }

      .archflow-container .transfer-modal {
        font-family: "JetBrains Mono", monospace;
        background: rgba(15, 23, 42, 0.95);
        border: 1.5px solid #336791;
        border-radius: 8px;
        width: 100%;
        height: 100%;
        box-shadow: 0 10px 25px rgba(51, 103, 145, 0.4);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        color: #e2e8f0;
        opacity: 0;
        transform: scale(0.9) translateY(10px);
        transition:
          opacity 0.3s,
          transform 0.3s;
      }
      .archflow-container .transfer-modal.show {
        opacity: 1;
        transform: none;
      }
      .archflow-container .transfer-header {
        background: #1e293b;
        padding: 6px 10px;
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 0.05em;
        border-bottom: 1px solid #334155;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .archflow-container .transfer-icon {
        font-size: 10px;
      }
      .archflow-container .transfer-title {
        color: #cbd5e1;
      }
      .archflow-container .transfer-pct {
        margin-left: auto;
        color: #38bdf8;
        font-weight: 800;
      }

      .archflow-container .transfer-progress-container {
        background: #0f172a;
        height: 6px;
        width: calc(100% - 20px);
        margin: 8px 10px 4px;
        border-radius: 3px;
        overflow: hidden;
        border: 1px solid #1e293b;
      }
      .archflow-container .transfer-progress-bar {
        background: linear-gradient(90deg, #336791 0%, #38bdf8 100%);
        height: 100%;
        width: 0%;
        border-radius: 3px;
        transition: width 0.1s linear;
        box-shadow: 0 0 6px rgba(56, 189, 248, 0.4);
      }
      .archflow-container .transfer-stats {
        display: flex;
        justify-content: space-between;
        padding: 0 10px;
        font-size: 8px;
        color: #94a3b8;
      }

      .archflow-container .transfer-log {
        flex: 1;
        background: #090d16;
        margin: 6px 10px 8px;
        border-radius: 4px;
        border: 1px solid #1e293b;
        padding: 4px 6px;
        font-size: 8px;
        line-height: 1.35;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
        text-align: left;
      }
      .archflow-container .log-line {
        color: #64748b;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .archflow-container .log-line.active {
        color: #38bdf8;
      }
      .archflow-container .log-line.success {
        color: #4ade80;
      }
      .archflow-container .log-line.finish {
        color: #a78bfa;
        font-weight: bold;
      }

      /* Outside fullscreen the page can grow/scroll, so the SVG's own
     aspect-ratio (width:100%; height:auto) is enough to show it fully. In
     fullscreen the container is pinned to a fixed 100vh with
     overflow:hidden, so .wrap must actively fill the remaining space and
     the SVG must fit *within* it (height:100%, letterboxed by
     preserveAspectRatio) — otherwise the bottom row of nodes silently gets
     clipped instead of shown or scrolled to. (Found the hard way — keep.) */
      .archflow-container:fullscreen {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        border: none;
      }
      .archflow-container:fullscreen .wrap {
        flex: 1 1 auto;
        min-height: 0;
      }
      .archflow-container:fullscreen .stage-area {
        min-height: 0;
      }
      .archflow-container:fullscreen svg.stage {
        width: 100%;
        height: 100%;
      }
      .archflow-container:fullscreen .log {
        max-height: calc(100vh - 160px);
      }
      .archflow-container:fullscreen .side {
        overflow-y: auto;
      }

      /* ---- Timeline scrubber (one segment per step; click/drag to jump) ---- */
      .archflow-container .scrubber {

      /* ---- Node inspector (click a node card to open) ---- */

      .archflow-container .inspector {

      .archflow-container .inspector-badge {
        display: inline-block;

      .archflow-container .inspector-desc {

      .archflow-container .inspector-section {

      .archflow-container .inspector-routes {

      .archflow-container .inspector-steps {

      .archflow-container .inspector-step-chip {

        height: 22px;
        padding: 2px 6px;
        justify-content: center;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- type="text/plain" so the browser never tries to execute this as JS
     directly; the bootstrap script below transforms and runs it. Babel
     Standalone's default "react" preset uses the AUTOMATIC JSX runtime,
     which emits `import ... from "react/jsx-runtime"` at the top of the
     output — invalid outside an ES module, and it silently kills the whole
     script with "Cannot use import statement outside a module". We force
     the CLASSIC runtime (React.createElement calls) in the bootstrap
     script below instead, since React is loaded as a plain global via the
     UMD build. (Found the hard way — keep this exact setup.) -->
    <script type="text/plain" id="app-source">
      const { useState, useEffect, useRef } = React;

      // Canvas dimensions for the SVG stage
      const STAGE_W = __STAGE_W__;
      const STAGE_H = __STAGE_H__;

      // Node card size
      const NW = 180;
      const NH = 76;

      const NODES = {
      __NODES__
      };

      const center = (n) => ({ x: NODES[n].x + NW / 2, y: NODES[n].y + NH / 2 });

      const STEPS = [
      __STEPS__
      ];

      const PHASES = [
      __PHASES__
      ];

      function buildPath(f, t) {
        const a = center(f);
        const b = center(t);
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        if (Math.abs(dx) >= Math.abs(dy)) {
          return `M ${a.x} ${a.y} C ${a.x + dx * 0.5} ${a.y}, ${b.x - dx * 0.5} ${b.y}, ${b.x} ${b.y}`;
        }
        return `M ${a.x} ${a.y} C ${a.x} ${a.y + dy * 0.5}, ${b.x} ${b.y - dy * 0.5}, ${b.x} ${b.y}`;
      }

      const pairKey = (a, b) => [a, b].sort().join('|');

      // Derived per-node info for the click-to-open node inspector: every unique
      // route label the node participates in, and every step index it appears at.
      function nodeInfo(id) {
        const routes = [];
        const stepIdxs = [];
        STEPS.forEach((s, i) => {
          if (s.f === id || s.t === id) {
            stepIdxs.push(i);
            if (routes.indexOf(s.route) === -1) routes.push(s.route);
          }
        });
        return { routes, stepIdxs };
      }

      const BIDIRECTIONAL = new Set([__BIDIRECTIONAL_PAIRS__]);

      // OPTIONAL persistence-save flourish. Set DB_INGEST_TO to null to disable.
      const DB_INGEST_FROM = __DB_INGEST_FROM__;
      const DB_INGEST_TO = __DB_INGEST_TO__;
      const DB_INGEST_ICON = "__DB_INGEST_ICON__";
      const DB_INGEST_TITLE = "__DB_INGEST_TITLE__";
      const DB_INGEST_FILES = [__DB_INGEST_FILES__];
      const DB_INGEST_CONSOLE_X = __DB_INGEST_CONSOLE_X__;
      const DB_INGEST_CONSOLE_Y = __DB_INGEST_CONSOLE_Y__;
      const DB_INGEST_PARTICLE_PATH = {
        startX: __PARTICLE_START_X__,
        startY: __PARTICLE_START_Y__,
        endX: __PARTICLE_END_X__,
        endY: __PARTICLE_END_Y__,
      };

      const TITLE = "__TITLE__";
      const SUBTITLE = "__SUBTITLE__";

      function ArchFlowDemo() {
        const [theme, setTheme] = useState('dark');
        const [speed, setSpeed] = useState(0.5);
        const [isPlaying, setIsPlaying] = useState(false);
        const [phaseText, setPhaseText] = useState('Ready');
        const [isDoneDisabled, setIsDoneDisabled] = useState(false);
        // progress mirrors idxRef into React state so the scrubber / step
        // counter / button labels re-render as the run advances.
        const [progress, setProgress] = useState(-1);
        // Node inspector: id of the clicked node, or null when closed.
        const [inspected, setInspected] = useState(null);

        const stageRef = useRef(null);
        const logRef = useRef(null);
        const scrubTrackRef = useRef(null);

        const playingRef = useRef(false);
        const idxRef = useRef(-1);
        const speedRef = useRef(0.5);
        const animRef = useRef(null);
        // True while the ⏭ Step phase fast-forward runs — jumpTo must not fire
        // then (DOM log-item listeners bypass the disabled-button guards).
        const ffRef = useRef(false);

        const [isFullscreen, setIsFullscreen] = useState(false);
        const containerRef = useRef(null);

        const toggleFullscreen = () => {
          if (!containerRef.current) return;
          if (!document.fullscreenElement) {
            containerRef.current.requestFullscreen().then(() => setIsFullscreen(true)).catch((err) => console.error(err));
          } else {
            document.exitFullscreen();
            setIsFullscreen(false);
          }
        };

        useEffect(() => {
          const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
          document.addEventListener('fullscreenchange', handleFullscreenChange);
          return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
        }, []);

        useEffect(() => {
          Object.keys(nodeElsRef.current).forEach((id) =>
            nodeElsRef.current[id].classList.toggle('inspected', id === inspected)
          );
        }, [inspected]);

        const edgesRef = useRef({});
        const nodeElsRef = useRef({});
        const pulseRef = useRef(null);
        const allArrowsRef = useRef([]);
        const bubbleLayerRef = useRef(null);
        const bubbleElsRef = useRef([]);
        const dbParticlesGroupRef = useRef(null);
        const pgConsoleFORef = useRef(null);

        const BASE = 2400;

        useEffect(() => { speedRef.current = speed; }, [speed]);
        useEffect(() => { playingRef.current = isPlaying; }, [isPlaying]);
        useEffect(() => () => { if (animRef.current) cancelAnimationFrame(animRef.current); }, []);

        useEffect(() => {
          if (!stageRef.current) return;
          stageRef.current.innerHTML = '';

          const SVGNS = 'http://www.w3.org/2000/svg';
          const el = (tag, attrs, text) => {
            const e = document.createElementNS(SVGNS, tag);
            for (const k in attrs) e.setAttribute(k, attrs[k]);
            if (text !== undefined && text !== null) e.textContent = text;
            return e;
          };

          const edges = {};
          const directed = new Set();

          STEPS.forEach((s) => {
            if (s.f !== s.t) {
              directed.add(s.f + '>' + s.t);
              const key = pairKey(s.f, s.t);
              if (!edges[key]) edges[key] = { from: s.f, to: s.t, d: buildPath(s.f, s.t) };
            }
          });

          const edgeLayer = el('g', {});
          stageRef.current.appendChild(edgeLayer);

          const edgesCached = {};
          Object.keys(edges).forEach((key) => {
            const e = edges[key];
            const p = el('path', { d: e.d, class: 'edge dashed' });
            edgeLayer.appendChild(p);
            edgesCached[key] = { el: p, from: e.from, to: e.to, len: p.getTotalLength(), arrows: {} };
          });
          edgesRef.current = edgesCached;

          const arrowLayer = el('g', {});
          stageRef.current.appendChild(arrowLayer);
          const allArrows = [];

          const norm = (x, y) => { const d = Math.hypot(x, y) || 1; return { x: x / d, y: y / d }; };
          const insideCard = (p, n, pad) => p.x >= n.x - pad && p.x <= n.x + NW + pad && p.y >= n.y - pad && p.y <= n.y + NH + pad;

          const makeArrow = (path, len, n, side) => {
            const STEP = 1;
            const OVERLAP = 2.5;
            let edgeL = 0;
            let tip = { x: 0, y: 0 };
            let dir = { x: 0, y: 0 };

            if (side === 'to') {
              edgeL = 0;
              for (let q = len; q >= 0; q -= STEP) {
                if (!insideCard(path.getPointAtLength(q), n, 0)) { edgeL = q; break; }
              }
              const onEdge = path.getPointAtLength(edgeL);
              const ahead = path.getPointAtLength(Math.min(len, edgeL + 8));
              dir = norm(ahead.x - onEdge.x, ahead.y - onEdge.y);
              tip = { x: onEdge.x + dir.x * OVERLAP, y: onEdge.y + dir.y * OVERLAP };
            } else {
              edgeL = len;
              for (let q = 0; q <= len; q += STEP) {
                if (!insideCard(path.getPointAtLength(q), n, 0)) { edgeL = q; break; }
              }
              const onEdge = path.getPointAtLength(edgeL);
              const back = path.getPointAtLength(Math.max(0, edgeL - 8));
              dir = norm(back.x - onEdge.x, back.y - onEdge.y);
              tip = { x: onEdge.x + dir.x * OVERLAP, y: onEdge.y + dir.y * OVERLAP };
            }

            const size = 7;
            const half = 4;
            const nx = -dir.y;
            const ny = dir.x;
            const bx = tip.x - dir.x * size;
            const by = tip.y - dir.y * size;
            const pts = `${tip.x.toFixed(1)},${tip.y.toFixed(1)} ${(bx + nx * half).toFixed(1)},${(by + ny * half).toFixed(1)} ${(bx - nx * half).toFixed(1)},${(by - ny * half).toFixed(1)}`;
            const poly = el('polygon', { points: pts, class: 'arrow' });
            arrowLayer.appendChild(poly);
            allArrows.push(poly);
            return poly;
          };

          Object.keys(edgesRef.current).forEach((key) => {
            const e = edgesRef.current[key];
            const nodesTo = NODES[e.to];
            const nodesFrom = NODES[e.from];
            e.arrows[e.to] = makeArrow(e.el, e.len, nodesTo, 'to');
            if (directed.has(e.to + '>' + e.from) || BIDIRECTIONAL.has(pairKey(e.from, e.to))) {
              e.arrows[e.from] = makeArrow(e.el, e.len, nodesFrom, 'from');
            }
          });
          allArrowsRef.current = allArrows;

          const pulse = el('circle', { r: 5.5, class: 'pulse', cx: -100, cy: -100, opacity: 0 });
          pulseRef.current = pulse;

          const nodeEls = {};
          Object.keys(NODES).forEach((id) => {
            const n = NODES[id];
            const g = el('g', { class: 'node' + (n.external ? ' external' : ''), 'data-id': id });
            g.appendChild(el('rect', { class: 'node-card', x: n.x, y: n.y, width: NW, height: NH, rx: 12 }));
            g.appendChild(el('circle', { cx: n.x + 30, cy: n.y + NH / 2, r: 19, fill: n.color }));
            g.appendChild(el('text', { class: 'node-icon', x: n.x + 30, y: n.y + NH / 2 + 1 }, n.icon));
            g.appendChild(el('text', { class: 'node-title', x: n.x + 58, y: n.y + 31 }, n.title));
            g.appendChild(el('text', { class: 'node-sub', x: n.x + 58, y: n.y + 50 }, n.sub));
            g.addEventListener('click', () => setInspected((prev) => (prev === id ? null : id)));
            stageRef.current.appendChild(g);
            nodeEls[id] = g;
          });
          nodeElsRef.current = nodeEls;

          stageRef.current.appendChild(pulse);

          const bubbleLayer = el('g', {});
          stageRef.current.appendChild(bubbleLayer);
          bubbleLayerRef.current = bubbleLayer;

          const dbParticlesGroup = el('g', { id: 'dbParticlesGroup' });
          stageRef.current.appendChild(dbParticlesGroup);
          dbParticlesGroupRef.current = dbParticlesGroup;

          if (DB_INGEST_TO) {
            const pgConsoleFO = el('foreignObject', { id: 'pgConsoleFO', x: DB_INGEST_CONSOLE_X, y: DB_INGEST_CONSOLE_Y, width: 255, height: 155, style: 'display: none;' });
            const consoleDiv = document.createElement('div');
            consoleDiv.className = 'transfer-modal';
            consoleDiv.innerHTML = `
              <div class="transfer-header">
                <span class="transfer-icon">${DB_INGEST_ICON}</span>
                <span class="transfer-title">${DB_INGEST_TITLE}</span>
                <span class="transfer-pct" id="transferPct">0%</span>
              </div>
              <div class="transfer-progress-container">
                <div class="transfer-progress-bar" id="transferProgressBar"></div>
              </div>
              <div class="transfer-stats">
                <div class="transfer-stat">Records: <span id="transferFiles">0 / ${DB_INGEST_FILES.length}</span></div>
                <div class="transfer-stat">Rate: <span id="transferRate">45.8 KB/s</span></div>
                <div class="transfer-stat">Time Left: <span id="transferTimeLeft">15s</span></div>
              </div>
              <div class="transfer-log" id="transferLog"></div>
            `;
            pgConsoleFO.appendChild(consoleDiv);
            stageRef.current.appendChild(pgConsoleFO);
            pgConsoleFORef.current = pgConsoleFO;
          }

          resetAnimation(false);
        }, []);

        function clearActive() {
          Object.values(edgesRef.current).forEach((e) => e.el.classList.remove('active', 'flow', 'call', 'data', 'flow-reverse'));
          Object.values(nodeElsRef.current).forEach((g) => g.classList.remove('active', 'working', 'db-ingesting'));
          if (pulseRef.current) pulseRef.current.setAttribute('opacity', '0');
          allArrowsRef.current.forEach((a) => a.classList.remove('blink'));
          clearBubbles();
          if (pgConsoleFORef.current) {
            pgConsoleFORef.current.style.display = 'none';
            const innerConsole = pgConsoleFORef.current.querySelector('.transfer-modal');
            if (innerConsole) innerConsole.classList.remove('show');
          }
          if (dbParticlesGroupRef.current) dbParticlesGroupRef.current.innerHTML = '';
        }

        function clearBubbles() {
          while (bubbleElsRef.current.length > 0) {
            const fo = bubbleElsRef.current.pop();
            if (fo && bubbleLayerRef.current) bubbleLayerRef.current.removeChild(fo);
          }
        }

        function addBubble(nodeId, text) {
          const n = NODES[nodeId];
          if (!n || !bubbleLayerRef.current) return;

          const top = n.y < STAGE_H / 2;
          const W = 200;
          const foH = top ? 95 : 85;
          let bx = n.x + NW / 2 - W / 2;
          bx = Math.max(8, Math.min(bx, STAGE_W - W - 8));
          const by = top ? n.y - 101 : n.y + NH + 4;

          const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
          fo.setAttribute('x', String(bx));
          fo.setAttribute('y', String(by));
          fo.setAttribute('width', String(W));
          fo.setAttribute('height', String(foH));

          const wrap = document.createElement('div');
          wrap.className = 'bubble-wrap ' + (top ? 'above' : 'below');
          const b = document.createElement('div');
          b.className = 'bubble ' + (top ? 'tail-down' : 'tail-up');
          const who = document.createElement('span');
          who.className = 'bubble-who';
          who.textContent = NODES[nodeId].title;
          b.appendChild(who);
          b.appendChild(document.createTextNode(text));
          wrap.appendChild(b);
          fo.appendChild(wrap);

          bubbleLayerRef.current.appendChild(fo);
          bubbleElsRef.current.push(fo);
        }

        function blinkArrow(edge, destId) {
          const a = edge.arrows[destId];
          if (!a) return;
          a.classList.remove('blink');
          void a.getBBox();
          a.classList.add('blink');
        }

        function travelBall(edge, srcId, dstId, kind, travelMs) {
          return new Promise((res) => {
            const forward = edge.from === srcId;
            edge.el.classList.remove('call', 'data', 'flow-reverse');
            edge.el.classList.add(kind);
            if (!forward) edge.el.classList.add('flow-reverse');
            if (pulseRef.current) {
              pulseRef.current.setAttribute('class', 'pulse ' + (kind === 'data' ? 'data' : 'call'));
              pulseRef.current.setAttribute('opacity', '1');
            }
            const t0 = performance.now();
            const tick = (now) => {
              let p = (now - t0) / travelMs;
              if (p > 1) p = 1;
              const eased = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
              const t = forward ? eased : 1 - eased;
              const pt = edge.el.getPointAtLength(edge.len * t);
              if (pulseRef.current) { pulseRef.current.setAttribute('cx', String(pt.x)); pulseRef.current.setAttribute('cy', String(pt.y)); }
              if (p >= 1) res(); else animRef.current = requestAnimationFrame(tick);
            };
            animRef.current = requestAnimationFrame(tick);
          });
        }

        function waitMs(ms) {
          return new Promise((res) => {
            const t0 = performance.now();
            const tick = (now) => { if (now - t0 >= ms) res(); else animRef.current = requestAnimationFrame(tick); };
            animRef.current = requestAnimationFrame(tick);
          });
        }

        function addLog(i) {
          if (!logRef.current) return;
          const s = STEPS[i];
          logRef.current.querySelectorAll('.log-item.cur').forEach((n) => n.classList.remove('cur'));
          const item = document.createElement('div');
          item.className = 'log-item cur ' + s.k;
          item.innerHTML = `
            <div class="log-num">${i + 1}</div>
            <div class="log-body">
              <span class="log-route">${s.route}</span>
              ${s.m}
            </div>
          `;
          item.title = 'Jump to this step';
          item.addEventListener('click', () => jumpTo(i));
          logRef.current.appendChild(item);
          logRef.current.scrollTop = logRef.current.scrollHeight;
        }

        function markDone(id) {
          const node = nodeElsRef.current[id];
          if (node) node.classList.add('done');
        }

        function triggerDbIngestAnimation(currentSpeed) {
          return new Promise((resolveAnimation) => {
            const dbNode = nodeElsRef.current[DB_INGEST_TO];
            if (dbNode) dbNode.classList.add('db-ingesting');

            if (pgConsoleFORef.current) {
              pgConsoleFORef.current.style.display = 'block';
              pgConsoleFORef.current.getBoundingClientRect();
              const innerConsole = pgConsoleFORef.current.querySelector('.transfer-modal');
              if (innerConsole) innerConsole.classList.add('show');
            }

            const pctEl = document.getElementById('transferPct');
            const barEl = document.getElementById('transferProgressBar');
            const filesEl = document.getElementById('transferFiles');
            const rateEl = document.getElementById('transferRate');
            const timeLeftEl = document.getElementById('transferTimeLeft');
            const localLogEl = document.getElementById('transferLog');
            if (localLogEl) localLogEl.innerHTML = '';

            const files = DB_INGEST_FILES;
            const totalDuration = 15000 / currentSpeed;
            const startTime = performance.now();
            let lastFileIdx = -1;
            let lastRateUpdate = 0;
            const transferActive = true;

            function addConsoleLog(text, type = 'normal') {
              if (!localLogEl) return;
              const line = document.createElement('div');
              line.className = 'log-line ' + type;
              line.textContent = text;
              localLogEl.appendChild(line);
              localLogEl.scrollTop = localLogEl.scrollHeight;
            }

            addConsoleLog('Opening transaction...', 'active');

            const progressTick = (now) => {
              if (!transferActive) return;
              const elapsed = now - startTime;
              const pct = Math.min(100, (elapsed / totalDuration) * 100);

              if (pctEl) pctEl.textContent = Math.round(pct) + '%';
              if (barEl) barEl.style.width = pct + '%';

              const secondsLeft = Math.max(0, Math.ceil((totalDuration - elapsed) / 1000));
              if (timeLeftEl) timeLeftEl.textContent = secondsLeft + 's';

              if (now - lastRateUpdate > 1200) {
                lastRateUpdate = now;
                const rate = (30 + Math.random() * 25).toFixed(1);
                if (rateEl) rateEl.textContent = rate + ' KB/s';
              }

              const step = 100 / files.length;
              const fileIdx = Math.floor(pct / step);
              if (fileIdx > lastFileIdx && fileIdx < files.length) {
                lastFileIdx = fileIdx;
                const f = files[fileIdx];
                if (filesEl) filesEl.textContent = `${fileIdx + 1} / ${files.length}`;
                addConsoleLog(`[${Math.round(pct)}%] Writing ${f.name} (${f.size})...`, 'active');
                if (localLogEl) {
                  const lines = localLogEl.querySelectorAll('.log-line');
                  if (lines.length > 1) {
                    const prevLine = lines[lines.length - 2];
                    prevLine.className = 'log-line success';
                    prevLine.textContent = '✓ ' + prevLine.textContent.substring(4);
                  }
                }
              }

              if (pct < 100) {
                animRef.current = requestAnimationFrame(progressTick);
              } else {
                if (filesEl) filesEl.textContent = `${files.length} / ${files.length}`;
                if (timeLeftEl) timeLeftEl.textContent = '0s';
                if (localLogEl) {
                  const lines = localLogEl.querySelectorAll('.log-line');
                  if (lines.length > 0) {
                    const last = lines[lines.length - 1];
                    last.className = 'log-line success';
                    if (last.textContent.startsWith('[')) last.textContent = '✓ ' + last.textContent.substring(6);
                  }
                }
                addConsoleLog('✓ COMMIT — transaction closed.', 'success');
                addConsoleLog('Saved. Next run will be smarter.', 'finish');
                setTimeout(() => { if (dbNode) dbNode.classList.remove('db-ingesting'); resolveAnimation(); }, 1000);
              }
            };
            animRef.current = requestAnimationFrame(progressTick);

            if (dbParticlesGroupRef.current) {
              dbParticlesGroupRef.current.innerHTML = '';
              const { startX, startY, endX, endY } = DB_INGEST_PARTICLE_PATH;
              const spawnInterval = 500 / currentSpeed;
              let spawnedCount = 0;
              const maxSpawns = Math.floor(totalDuration / spawnInterval) - 2;
              const fileEmojis = ['📄', '📝', '📊', '📁', '⚡', '🗃️'];

              const spawnFileIcon = () => {
                if (spawnedCount >= maxSpawns || !transferActive || !dbParticlesGroupRef.current) return;
                spawnedCount++;
                const emoji = fileEmojis[Math.floor(Math.random() * fileEmojis.length)];
                const p = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                p.setAttribute('x', String(startX));
                p.setAttribute('y', String(startY));
                p.setAttribute('font-size', '13px');
                p.setAttribute('text-anchor', 'middle');
                p.setAttribute('dominant-baseline', 'middle');
                p.setAttribute('opacity', '0.9');
                p.setAttribute('style', `cursor: default; user-select: none; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji';`);
                p.textContent = emoji;
                dbParticlesGroupRef.current.appendChild(p);

                const iconStartTime = performance.now();
                const duration = (900 + Math.random() * 400) / currentSpeed;
                const offsetX = (Math.random() - 0.5) * 30;
                const offsetY = -25 - Math.random() * 45;

                const animateIcon = (now) => {
                  const elapsed = now - iconStartTime;
                  const pct = Math.min(1, elapsed / duration);
                  const eased = pct < 0.5 ? 4 * pct * pct * pct : 1 - Math.pow(-2 * pct + 2, 3) / 2;
                  const cx = startX + (endX - startX) * eased + offsetX * Math.sin(pct * Math.PI);
                  const cy = startY + (endY - startY) * eased + offsetY * Math.sin(pct * Math.PI);
                  const rotation = eased * 360;
                  p.setAttribute('x', String(cx));
                  p.setAttribute('y', String(cy));
                  p.setAttribute('transform', `rotate(${rotation}, ${cx}, ${cy})`);
                  p.setAttribute('opacity', String(1 - eased));
                  if (pct < 1) requestAnimationFrame(animateIcon); else p.remove();
                };
                requestAnimationFrame(animateIcon);
                setTimeout(spawnFileIcon, spawnInterval);
              };
              spawnFileIcon();
            }
          });
        }

        function runStep(i) {
          return new Promise((resolve) => {
            const s = STEPS[i];
            clearActive();
            setPhaseText(PHASES[s.ph]);
            setProgress(i);
            addLog(i);

            const currentSpeed = speedRef.current;
            let dur = BASE / currentSpeed;
            const V = 0.125 * currentSpeed;

            const chat = s.chat || [];
            const shownChat = new Array(chat.length).fill(false);
            const revealChat = (elapsed) => {
              for (let c = 0; c < chat.length; c++) {
                if (shownChat[c]) continue;
                const at = dur * Math.min(0.5, c * 0.42);
                if (elapsed >= at) { shownChat[c] = true; addBubble(chat[c][0], chat[c][1]); }
              }
            };

            if (s.f === s.t) {
              dur = 1600 / currentSpeed;
              const activeNode = nodeElsRef.current[s.f];
              if (activeNode) activeNode.classList.add('active', 'working');
              const t0 = performance.now();
              const tick = (now) => {
                revealChat(now - t0);
                if (now - t0 >= dur) {
                  if (activeNode) activeNode.classList.remove('working');
                  markDone(s.f);
                  resolve();
                } else {
                  animRef.current = requestAnimationFrame(tick);
                }
              };
              animRef.current = requestAnimationFrame(tick);
              return;
            }

            if (s.roundTrip) {
              const rtEdge = edgesRef.current[pairKey(s.f, s.t)];
              const asker = s.t;
              const responder = s.f;
              rtEdge.el.classList.remove('call', 'data');
              rtEdge.el.classList.add('active', 'flow', 'call');
              const askerNode = nodeElsRef.current[asker];
              const responderNode = nodeElsRef.current[responder];
              if (askerNode) askerNode.classList.add('active');
              if (responderNode) responderNode.classList.add('active');

              const leg = rtEdge.len / V;
              (async () => {
                if (chat[0]) addBubble(chat[0][0], chat[0][1]);
                await travelBall(rtEdge, asker, responder, 'call', leg);
                blinkArrow(rtEdge, responder);
                await waitMs(200 / currentSpeed);
                if (chat[1]) addBubble(chat[1][0], chat[1][1]);
                await travelBall(rtEdge, responder, asker, 'data', leg);
                blinkArrow(rtEdge, asker);
                await waitMs(300 / currentSpeed);
                markDone(asker);
                markDone(responder);
                resolve();
              })();
              return;
            }

            const edge = edgesRef.current[pairKey(s.f, s.t)];
            const forward = edge.from === s.f;
            edge.el.classList.remove('call', 'data', 'flow-reverse');
            edge.el.classList.add('active', 'flow', s.k);
            if (!forward) edge.el.classList.add('flow-reverse');
            const fromNode = nodeElsRef.current[s.f];
            const toNode = nodeElsRef.current[s.t];
            if (fromNode) fromNode.classList.add('active');
            if (toNode) toNode.classList.add('active');

            if (pulseRef.current) {
              pulseRef.current.setAttribute('class', 'pulse ' + (s.k === 'data' ? 'data' : 'call'));
              pulseRef.current.setAttribute('opacity', '1');
            }

            const travel = edge.len / V;
            dur = travel + 600 / currentSpeed;
            const t0 = performance.now();
            let arrived = false;

            const tick = async (now) => {
              revealChat(now - t0);
              let p = (now - t0) / travel;
              if (p > 1) p = 1;
              const eased = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
              const t = forward ? eased : 1 - eased;
              const pt = edge.el.getPointAtLength(edge.len * t);
              if (pulseRef.current) { pulseRef.current.setAttribute('cx', String(pt.x)); pulseRef.current.setAttribute('cy', String(pt.y)); }

              if (p >= 1 && !arrived) {
                arrived = true;
                blinkArrow(edge, s.t);
                if (DB_INGEST_TO && s.f === DB_INGEST_FROM && s.t === DB_INGEST_TO) triggerDbIngestAnimation(currentSpeed);
              }

              const extraWait = DB_INGEST_TO && s.f === DB_INGEST_FROM && s.t === DB_INGEST_TO ? 15000 / currentSpeed : 0;
              if (p >= 1 && now - t0 >= dur + extraWait) {
                markDone(s.f);
                markDone(s.t);
                resolve();
              } else {
                animRef.current = requestAnimationFrame(tick);
              }
            };
            animRef.current = requestAnimationFrame(tick);
          });
        }

        async function advance() {
          if (idxRef.current >= STEPS.length - 1) { stopPlay(); return false; }
          idxRef.current++;
          await runStep(idxRef.current);
          if (idxRef.current >= STEPS.length - 1) {
            stopPlay();
            resetAnimation(true, true);
            setPhaseText('Run completed');
            markRunCompleteInLog();
          }
          return true;
        }

        function markRunCompleteInLog() {
          if (!logRef.current) return;
          logRef.current.querySelectorAll('.log-item.cur').forEach((n) => n.classList.remove('cur'));
          const item = document.createElement('div');
          item.className = 'log-item cur';
          item.innerHTML = `
            <div class="log-num" style="background: #22c55e;">✓</div>
            <div class="log-body">
              <span class="log-route">System</span>
              Run completed
            </div>
          `;
          logRef.current.appendChild(item);
          logRef.current.scrollTop = logRef.current.scrollHeight;
        }

        async function loop() {
          while (playingRef.current) {
            const more = await advance();
            if (!more) break;
          }
        }

        function startPlay() {
          if (idxRef.current >= STEPS.length - 1) resetAnimation(false);
          else if (idxRef.current === -1 && logRef.current) logRef.current.innerHTML = '';
          setIsPlaying(true);
          playingRef.current = true;
          loop();
        }

        function stopPlay() {
          setIsPlaying(false);
          playingRef.current = false;
          if (animRef.current) cancelAnimationFrame(animRef.current);
        }

        function resetAnimation(repaint = true, keepLogs = false) {
          stopPlay();
          idxRef.current = -1;
          setProgress(-1);
          clearActive();
          Object.values(nodeElsRef.current).forEach((g) => g.classList.remove('done'));
          if (!keepLogs && logRef.current) logRef.current.innerHTML = '';
          if (repaint) setPhaseText('Ready');
        }

        // Jump the demo to the state where step `target` has just completed:
        // done-marks and the activity log are rebuilt for steps 0..target, and
        // the target step's nodes, edge and chat are shown statically so the
        // jumped-to moment reads at a glance. target = -1 lands on "Ready".
        // Backs the scrubber, the ⏮ Back button, the clickable activity log,
        // and the inspector's step chips.
        function jumpTo(target) {
          if (ffRef.current) return;
          stopPlay();
          target = Math.max(-1, Math.min(STEPS.length - 1, target));
          idxRef.current = target;
          setProgress(target);
          clearActive();
          Object.values(nodeElsRef.current).forEach((g) => g.classList.remove('done'));
          if (logRef.current) logRef.current.innerHTML = '';
          for (let i = 0; i <= target; i++) {
            markDone(STEPS[i].f);
            markDone(STEPS[i].t);
            addLog(i);
          }
          if (target < 0) {
            setPhaseText('Ready');
            return;
          }
          const s = STEPS[target];
          setPhaseText(PHASES[s.ph]);
          const fromNode = nodeElsRef.current[s.f];
          const toNode = nodeElsRef.current[s.t];
          if (fromNode) fromNode.classList.add('active');
          if (toNode) toNode.classList.add('active');
          if (s.f !== s.t) {
            const edge = edgesRef.current[pairKey(s.f, s.t)];
            if (edge) edge.el.classList.add('active', s.k === 'data' ? 'data' : 'call');
          }
          (s.chat || []).forEach((c) => addBubble(c[0], c[1]));
        }

        function scrubToEvent(e) {
          const track = scrubTrackRef.current;
          if (!track) return;
          const r = track.getBoundingClientRect();
          let frac = (e.clientX - r.left) / r.width;
          frac = Math.max(0, Math.min(0.999, frac));
          const i = Math.floor(frac * STEPS.length);
          if (i !== idxRef.current) jumpTo(i);
        }

        async function handleStep() {
          if (playingRef.current) return;
          const nextStep = STEPS[idxRef.current + 1];
          if (!nextStep) return;
          const targetPh = nextStep.ph;

          setIsDoneDisabled(true);
          ffRef.current = true;
          const savedSpeed = speedRef.current;
          speedRef.current = 250;

          while (idxRef.current < STEPS.length - 1) {
            const stepToRun = STEPS[idxRef.current + 1];
            if (!stepToRun || stepToRun.ph !== targetPh) break;
            idxRef.current++;
            await runStep(idxRef.current);
          }

          speedRef.current = savedSpeed;

          if (idxRef.current >= STEPS.length - 1) {
            stopPlay();
            resetAnimation(true, true);
            setPhaseText('Run completed');
            markRunCompleteInLog();
          } else {
            clearActive();
            setPhaseText(PHASES[STEPS[idxRef.current].ph]);
          }
          ffRef.current = false;
          setIsDoneDisabled(false);
        }

        function adjustSpeed(amount) {
          let nextSpeed = speed + amount;
          nextSpeed = parseFloat(nextSpeed.toFixed(1));
          if (nextSpeed >= 0.1 && nextSpeed <= 3.0) setSpeed(nextSpeed);
        }

        return (
          <div ref={containerRef} className={`archflow-container ${theme === 'light' ? 'light' : ''}`}>
            <header>
              <div>
                <h1>{TITLE}</h1>
                <p>{SUBTITLE}</p>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} title="Toggle theme">
                  {theme === 'dark' ? '☀ Light' : '🌙 Dark'}
                </button>
                <button onClick={toggleFullscreen} title={isFullscreen ? 'Exit Fullscreen' : 'Enter Fullscreen'}>
                  {isFullscreen ? '🗗 Exit' : '⛶ Fullscreen'}
                </button>
              </div>
            </header>

            <div className="toolbar">
              <button onClick={() => (isPlaying ? stopPlay() : startPlay())} className={!isPlaying ? 'primary' : ''} disabled={isDoneDisabled}>
                {isPlaying ? '⏸ Pause' : progress >= STEPS.length - 1 ? '▶ Replay' : '▶ Play'}
              </button>
              <button onClick={() => jumpTo(idxRef.current - 1)} disabled={isPlaying || isDoneDisabled || progress < 0} title="Back one step">⏮ Back</button>
              <button onClick={handleStep} disabled={isPlaying || isDoneDisabled}>⏭ Step</button>
              <button onClick={() => resetAnimation(true)} disabled={isDoneDisabled}>↻ Restart</button>
              <span className="speed">
                Speed
                <button onClick={() => adjustSpeed(-0.1)} className="speed-btn" disabled={isDoneDisabled}>−</button>
                <span id="speedVal">{speed.toFixed(1)}×</span>
                <button onClick={() => adjustSpeed(0.1)} className="speed-btn" disabled={isDoneDisabled}>+</button>
              </span>
              <span className="spacer"></span>
              <span className="phase-tag">{phaseText}</span>
            </div>

            <div className="scrubber">
              <span className="scrub-count">{progress + 1} / {STEPS.length}</span>
              <div
                ref={scrubTrackRef}
                className="scrub-track"
                title="Drag or click to jump to any step"
                onPointerDown={(e) => {
                  if (isDoneDisabled) return;
                  e.currentTarget.setPointerCapture(e.pointerId);
                  scrubToEvent(e);
                }}
                onPointerMove={(e) => {
                  if (isDoneDisabled || e.buttons !== 1) return;
                  scrubToEvent(e);
                }}
              >
                {STEPS.map((s, i) => (
                  <div
                    key={i}
                    className={
                      'scrub-seg' +
                      (i <= progress ? ' filled' : '') +
                      (i > 0 && STEPS[i - 1].ph !== s.ph ? ' phase-start' : '')
                    }
                  />
                ))}
              </div>
            </div>

            <div className="wrap">
              <div className="stage-area">
                <svg ref={stageRef} className="stage" viewBox={`0 0 ${STAGE_W} ${STAGE_H}`} preserveAspectRatio="xMidYMid meet" aria-label={TITLE}></svg>
              </div>
              <aside className="side">
                {inspected && NODES[inspected] && (
                  <div className="inspector">
                    <div className="inspector-head">
                      <span className="inspector-icon" style={{ background: NODES[inspected].color }}>{NODES[inspected].icon}</span>
                      <div className="inspector-name">
                        <div className="inspector-title">{NODES[inspected].title}</div>
                        <div className="inspector-sub">{NODES[inspected].sub}</div>
                      </div>
                      <button className="inspector-close" onClick={() => setInspected(null)} title="Close inspector">✕</button>
                    </div>
                    {NODES[inspected].external && (
                      <span className="inspector-badge">External system — depended on, not owned</span>
                    )}
                    {NODES[inspected].desc && <p className="inspector-desc">{NODES[inspected].desc}</p>}
                    <div className="inspector-section">Connections</div>
                    <ul className="inspector-routes">
                      {nodeInfo(inspected).routes.map((r) => (
                        <li key={r}>{r}</li>
                      ))}
                    </ul>
                    <div className="inspector-section">Appears in steps</div>
                    <div className="inspector-steps">
                      {nodeInfo(inspected).stepIdxs.map((i) => (
                        <button key={i} className="inspector-step-chip" onClick={() => jumpTo(i)} title={STEPS[i].m}>{i + 1}</button>
                      ))}
                    </div>
                  </div>
                )}
                <h2>Activity log</h2>
                <div ref={logRef} className="log"></div>
              </aside>
            </div>

            <footer>
              <div className="legend">
                <span><i className="dot" style={{ background: 'var(--accent)' }}></i> control / hand-off</span>
                <span><i className="dot" style={{ background: '#0ea5a4' }}></i> data returned</span>
                <span><i className="dot" style={{ background: '#f59e0b' }}></i> working</span>
                <span><i className="dot" style={{ background: '#374151', border: '1px dashed #94a3b8' }}></i> external system</span>
              </div>
              __FOOTER_JSX__
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<ArchFlowDemo />);
    </script>

    <script>
      (function () {
        var source = document.getElementById("app-source").textContent;
        var output = Babel.transform(source, {
          presets: [["react", { runtime: "classic" }]],
        }).code;
        var script = document.createElement("script");
        script.textContent = output;
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
